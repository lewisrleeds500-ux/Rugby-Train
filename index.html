<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FIFTEEN">
<title>FIFTEEN</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080808;--surf:#111;--surf2:#191919;--surf3:#222;
  --bdr:#2c2c2c;--acc:#C5F135;--acc-d:rgba(197,241,53,.11);--acc-m:rgba(197,241,53,.32);
  --txt:#fff;--txt2:#888;--txt3:#3a3a3a;
  --red:#FF453A;--red-d:rgba(255,69,58,.13);
  --yel:#FFD60A;--yel-d:rgba(255,214,10,.13);
  --grn:#32D74B;--grn-d:rgba(50,215,75,.13);
  --nav-h:76px;--st:env(safe-area-inset-top,20px);--sb:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased}
#app{height:100vh;height:100dvh;display:flex;flex-direction:column}
.views{flex:1;overflow:hidden;position:relative}
.view{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding:calc(var(--st)+8px) 16px calc(var(--nav-h)+24px);opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity .2s ease,transform .2s ease;-webkit-overflow-scrolling:touch}
.view.on{opacity:1;pointer-events:all;transform:none}
nav{height:var(--nav-h);padding-bottom:var(--sb);background:rgba(8,8,8,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bdr);display:flex;position:relative;z-index:100;flex-shrink:0}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:none;border:none;color:var(--txt3);cursor:pointer;transition:color .18s;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.nb.on{color:var(--acc)}
.nb svg{width:20px;height:20px}
/* TYPOGRAPHY */
.hd1{font-family:'Bebas Neue',sans-serif;font-size:42px;line-height:1;letter-spacing:.5px}
.hd2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.3px;margin-bottom:10px}
.hd3{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.2px}
.lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--txt2);text-transform:uppercase}
.tag{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:3px 8px;border-radius:4px;display:inline-block}
.tag-a{background:var(--acc-d);color:var(--acc)}
.tag-g{background:var(--grn-d);color:var(--grn)}
.tag-r{background:var(--red-d);color:var(--red)}
.tag-y{background:var(--yel-d);color:var(--yel)}
/* CARDS */
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:16px;padding:16px;margin-bottom:12px}
/* BUTTONS */
.btn{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:12px 18px;border-radius:12px;border:none;cursor:pointer;transition:all .14s;display:inline-flex;align-items:center;gap:8px}
.btn-acc{background:var(--acc);color:#000}
.btn-acc:active{transform:scale(.97)}
.btn-ghost{background:var(--surf2);color:var(--txt);border:1px solid var(--bdr)}
.btn-ghost:active{transform:scale(.97)}
.btn-sm{padding:8px 12px;font-size:11px;border-radius:8px}
.btn-full{width:100%;justify-content:center}
.btn-danger{background:var(--red-d);color:var(--red);border:1px solid var(--red-d)}
/* TAB BAR */
.tabbar{display:flex;background:var(--surf);border-radius:12px;padding:3px;margin-bottom:14px;border:1px solid var(--bdr);gap:2px}
.tbb{flex:1;padding:8px 4px;border:none;background:none;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--txt3);border-radius:9px;cursor:pointer;transition:all .16s}
.tbb.on{background:var(--surf3);color:var(--txt)}
/* CHECK ITEMS */
.chk-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--bdr);cursor:pointer;transition:opacity .18s;-webkit-user-select:none;user-select:none}
.chk-row:last-child{border-bottom:none}
.chk-row.done{opacity:.4}
.chk-circle{width:22px;height:22px;border-radius:50%;border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;transition:all .16s;flex-shrink:0}
.chk-row.done .chk-circle{background:var(--acc);border-color:var(--acc)}
.chk-tick{color:#000;font-size:11px;opacity:0;transition:opacity .14s}
.chk-row.done .chk-tick{opacity:1}
/* PILLS */
.pills{display:flex;overflow-x:auto;gap:6px;padding-bottom:8px;margin-bottom:12px;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pill{padding:5px 12px;border-radius:20px;border:1px solid var(--bdr);background:transparent;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--txt2);white-space:nowrap;cursor:pointer;transition:all .14s;flex-shrink:0}
.pill.on{background:var(--acc);color:#000;border-color:var(--acc)}
/* PROGRESS */
.pbar{background:var(--surf3);border-radius:4px;height:4px;overflow:hidden}
.pfill{height:100%;background:var(--acc);border-radius:4px;transition:width .35s ease}
/* COUNTDOWN */
.cd-card{background:linear-gradient(135deg,#0C1900,#162400);border:1px solid rgba(197,241,53,.25);border-radius:20px;padding:20px;margin-bottom:12px;position:relative;overflow:hidden}
.cd-card::after{content:'';position:absolute;top:-60px;right:-60px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(197,241,53,.1),transparent 70%);pointer-events:none}
.cd-num{font-family:'Bebas Neue',sans-serif;font-size:80px;color:var(--acc);line-height:.9}
.cd-unit{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.12em;color:rgba(197,241,53,.55);text-transform:uppercase;margin-top:4px}
/* SESSION ACCORDION */
.sess{background:var(--surf);border:1px solid var(--bdr);border-radius:16px;overflow:hidden;margin-bottom:10px;transition:border-color .18s}
.sess.open{border-color:rgba(197,241,53,.28)}
.sess-hdr{padding:14px;cursor:pointer;display:flex;align-items:center;gap:12px}
.sess-letter{font-family:'Bebas Neue',sans-serif;font-size:40px;color:var(--acc);line-height:1;width:32px;flex-shrink:0}
.sess-info{flex:1}
.sess-tag{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--acc);text-transform:uppercase;margin-bottom:2px}
.sess-name{font-size:14px;font-weight:600}
.sess-chev{color:var(--txt3);transition:transform .18s;flex-shrink:0}
.sess.open .sess-chev{transform:rotate(180deg)}
.sess-body{padding:0 14px 14px;display:none}
.sess.open .sess-body{display:block}
.sess-focus{background:var(--surf2);border-radius:10px;padding:9px 12px;margin-bottom:12px;font-size:13px;color:var(--txt2);line-height:1.55}
.nut-box{background:rgba(197,241,53,.05);border:1px solid rgba(197,241,53,.14);border-radius:10px;padding:10px 13px;margin-top:12px;font-size:13px;color:var(--txt2);line-height:1.7}
.nut-box strong{color:var(--acc)}
.blk-hdr{display:flex;align-items:center;gap:8px;padding:10px 0 5px;margin-top:4px}
.blk-name{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--acc)}
.blk-line{flex:1;height:1px;background:var(--surf3)}
.ex-row{padding:11px 0;border-bottom:1px solid var(--bdr)}
.ex-row:last-child{border-bottom:none}
.ex-name{font-size:14px;font-weight:500;margin-bottom:4px}
.ex-meta{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--txt2);margin-bottom:6px}
.ex-note{font-size:11px;color:var(--txt3);font-style:italic}
.sets-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.set-btn{width:34px;height:34px;border-radius:7px;border:2px solid var(--bdr);background:transparent;color:var(--txt3);font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;cursor:pointer;transition:all .14s;display:flex;align-items:center;justify-content:center}
.set-btn.done{background:var(--acc);border-color:var(--acc);color:#000}
/* FILM CARDS */
.vc{background:var(--surf);border:1px solid var(--bdr);border-radius:13px;overflow:hidden;margin-bottom:8px}
.vc-hdr{padding:12px;display:flex;align-items:flex-start;gap:10px;cursor:pointer}
.vc-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--txt3);line-height:1;min-width:28px;flex-shrink:0}
.vc-info{flex:1;min-width:0}
.vc-title{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:3px}
.vc-cat{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--txt2)}
.vc-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.vc-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;transition:all .14s}
.vc-dot.w{background:var(--grn);border-color:var(--grn)}
.vc-dot.r{background:var(--yel);border-color:var(--yel)}
.vc-body{padding:0 12px 12px;display:none}
.vc.open .vc-body{display:block}
.wc-row{font-size:12px;color:var(--txt2);padding:5px 0;border-bottom:1px solid var(--bdr);display:flex;gap:8px;line-height:1.5}
.wc-row::before{content:'→';color:var(--acc);font-size:10px;flex-shrink:0;margin-top:2px}
.wc-row:last-child{border-bottom:none}
.yt-link{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:9px;background:var(--surf2);border:1px solid var(--bdr);border-radius:9px;color:var(--txt);text-decoration:none;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-top:10px}
.insight-box{background:var(--surf2);border-radius:8px;padding:8px 10px;margin-top:8px}
.insight-box textarea{background:transparent;border:none;font-size:12px;color:var(--txt2);width:100%;resize:none;outline:none;font-family:'Barlow',sans-serif;min-height:60px}
/* VISUALISATION */
.scr-card{background:var(--surf);border:1px solid var(--bdr);border-radius:16px;overflow:hidden;margin-bottom:10px}
.scr-hdr{padding:14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.scr-chev{color:var(--txt3);transition:transform .18s;flex-shrink:0}
.scr-card.open .scr-chev{transform:rotate(180deg)}
.scr-body{padding:0 14px 14px;display:none}
.scr-card.open .scr-body{display:block}
.scr-text{font-size:15px;line-height:1.9;color:var(--txt2);white-space:pre-line}
/* BREATHING */
.breath-wrap{display:flex;flex-direction:column;align-items:center;padding:24px 0 16px}
.bc-ring{width:200px;height:200px;position:relative;margin-bottom:24px}
.bc{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle,rgba(197,241,53,.12),rgba(197,241,53,.02));border:2px solid rgba(197,241,53,.18);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:transform .6s cubic-bezier(.4,0,.2,1),border-color .6s,background .6s}
.bc.expand{transform:scale(1.3);border-color:rgba(197,241,53,.7);background:radial-gradient(circle,rgba(197,241,53,.25),rgba(197,241,53,.05))}
.bc.hold-big{transform:scale(1.3);border-color:rgba(197,241,53,.4)}
.bc.contract{transform:scale(1);border-color:rgba(197,241,53,.16);background:radial-gradient(circle,rgba(197,241,53,.06),transparent)}
.bc-num{font-family:'Bebas Neue',sans-serif;font-size:64px;color:var(--acc);line-height:1}
.bc-phase{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.12em;color:rgba(197,241,53,.6);text-transform:uppercase;margin-top:2px}
.bc-type{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--txt3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;text-align:center}
/* CUES */
.cue-grp{margin-bottom:18px}
.cue-title{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--acc);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.cue-item{background:var(--surf2);border-radius:10px;padding:11px 14px;margin-bottom:5px;font-size:14px;font-weight:500;border-left:3px solid var(--acc);line-height:1.4}
/* PRE-GAME */
.pg-phase{margin-bottom:18px}
.pg-phase-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--acc);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(197,241,53,.2)}
/* MONITOR */
.mon-opt{flex:1;padding:10px 5px;border-radius:10px;border:2px solid var(--bdr);text-align:center;cursor:pointer;transition:all .14s;background:transparent;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--txt2)}
.mon-opt.sg{background:var(--grn-d);border-color:var(--grn);color:var(--grn)}
.mon-opt.sy{background:var(--yel-d);border-color:var(--yel);color:var(--yel)}
.mon-opt.sr{background:var(--red-d);border-color:var(--red);color:var(--red)}
.scale-row{display:flex;gap:5px}
.sc-btn{flex:1;padding:10px 0;border-radius:8px;border:2px solid var(--bdr);background:transparent;font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--txt3);cursor:pointer;transition:all .14s}
.sc-btn.sel{background:var(--acc-d);border-color:var(--acc);color:var(--acc)}
/* RECOVERY STEPS */
.rec-step{background:var(--surf);border:1px solid var(--bdr);border-radius:13px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:all .18s}
.rec-step.cur{border-color:var(--acc);background:rgba(197,241,53,.04)}
.rec-step.fin{opacity:.35}
.step-num{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--txt3);width:28px;text-align:center;flex-shrink:0}
.rec-step.cur .step-num{color:var(--acc)}
.step-info{flex:1}
.step-name{font-size:14px;font-weight:600;margin-bottom:2px}
.step-dur{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--txt2)}
.step-tip{font-size:12px;color:var(--txt2);margin-top:5px;line-height:1.45;display:none}
.rec-step.cur .step-tip{display:block}
.step-timer{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--acc);background:var(--acc-d);border:none;border-radius:8px;padding:7px 10px;cursor:pointer;min-width:52px;text-align:center;flex-shrink:0}
/* KICKING LOG */
.kle{background:var(--surf);border:1px solid var(--bdr);border-radius:11px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:11px}
.kle-pct{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--acc);min-width:46px}
.kle-det{flex:1}
.kle-date{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--txt2);margin-bottom:2px}
.kle-type{font-size:13px;font-weight:500}
.kle-note{font-size:11px;color:var(--txt3);margin-top:2px}
/* PB CARDS */
.pb-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.pb-card{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:13px;text-align:center}
.pb-val{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--acc);line-height:1}
.pb-lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;color:var(--txt2);letter-spacing:.1em;text-transform:uppercase;margin-top:3px}
/* FORM */
.fg{margin-bottom:12px}
.fl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--txt2);margin-bottom:5px;display:block}
select,input[type=number],input[type=text]{background:var(--surf2);border:1px solid var(--bdr);border-radius:10px;color:var(--txt);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;padding:10px 12px;width:100%;outline:none;-webkit-appearance:none;appearance:none}
select:focus,input:focus{border-color:var(--acc)}
textarea{width:100%;background:var(--surf2);border:1px solid var(--bdr);border-radius:10px;color:var(--txt);font-family:'Barlow',sans-serif;font-size:13px;padding:9px 11px;resize:none;outline:none;min-height:70px}
textarea:focus{border-color:var(--acc)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
/* QUICK GRID */
.qg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.qb{background:var(--surf);border:1px solid var(--bdr);border-radius:13px;padding:14px;cursor:pointer;transition:border-color .14s;text-align:left;display:flex;flex-direction:column;gap:5px}
.qb:active{border-color:var(--acc)}
.qb-icon{font-size:20px}
.qb-lbl{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase}
.qb-sub{font-size:11px;color:var(--txt2)}
/* WEEKLY */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px}
.wd{aspect-ratio:1;border-radius:7px;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;text-transform:uppercase;flex-direction:column;gap:1px}
.wd-day{font-size:8px;color:var(--txt3);letter-spacing:.05em}
.wd.has-g{background:var(--grn-d);color:var(--grn)}
.wd.has-y{background:var(--yel-d);color:var(--yel)}
.wd.has-r{background:var(--red-d);color:var(--red)}
.wd.today-hl{border:2px solid var(--acc)}
/* TOAST */
.toast{position:fixed;bottom:calc(var(--nav-h)+12px);left:50%;transform:translateX(-50%) translateY(14px);background:var(--surf3);border:1px solid var(--bdr);border-radius:20px;padding:9px 18px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.06em;z-index:999;opacity:0;transition:opacity .2s,transform .2s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(8px)}
.modal-bg.show{opacity:1;pointer-events:all}
.modal{background:var(--surf);border-radius:24px 24px 0 0;width:100%;padding:20px 20px calc(20px + var(--sb));max-height:80vh;overflow-y:auto;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.modal-bg.show .modal{transform:translateY(0)}
.modal-handle{width:40px;height:4px;background:var(--bdr);border-radius:2px;margin:0 auto 16px}
/* DIVIDER */
.dvd{height:1px;background:var(--bdr);margin:14px 0}
/* FIELD */
.field-sess{background:var(--surf2);border-radius:12px;padding:12px 14px;margin-bottom:9px;border-left:3px solid var(--acc)}
.field-num{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--acc);margin-bottom:2px}
.field-name{font-size:14px;font-weight:600;margin-bottom:4px}
.field-desc{font-size:12px;color:var(--txt2);line-height:1.5}
/* STATS ROW */
.stats-row{display:flex;gap:8px;margin-bottom:12px}
.stat-box{flex:1;background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:12px 10px;text-align:center}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--acc);line-height:1}
.stat-lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;color:var(--txt2);letter-spacing:.09em;text-transform:uppercase;margin-top:2px}
</style>
</head>
<body>
<div id="app">
  <div class="views">
    <div id="v-home" class="view on"></div>
    <div id="v-train" class="view"></div>
    <div id="v-mental" class="view"></div>
    <div id="v-film" class="view"></div>
    <div id="v-log" class="view"></div>
  </div>

You move into position underneath it. Eyes locked on the ball. The wind catches it slightly right — you adjust two steps. Feet settle under you.

The ball comes down. You see the stitching rotate. Soft hands — you take it cleanly. No panic. Your fingers wrap and hold.

Box kick — high, short. You've called it before it peaks. You're moving forward now. The chaser is hard off the left channel. You track the ball. Track the chaser. Ball first. Always ball first.

You take it at chest height — in traffic. You immediately go to ground and present. Low, protected. Your team clears. Gain line held.

That read didn't happen in the moment. It happened in sessions like this one. You did it a hundred times before this game.

Breathe. Let that settle.`},
  {id:'vs3',title:'Entering the Line as an Attacker',dur:'3 min',text:`Close your eyes. Breathe slowly.

Pick your entry point. Timing is everything. Too early — you kill the space. Too late — the moment's gone. You wait. You read the 13's shoulders.

Now. You accelerate hard. The 13 holds the defender an extra half-second. You're through the gap before the defence reacts. Running at their fullback who has drifted.

Outside shoulder. Body dip. Burst. You're clear. Gone.

Even if you don't score — you pulled two defenders. Your winger scored off the overlap your run created. Your entry made the try.

Sit with that for a moment.`},
  {id:'vs4',title:'Kick Chase & Regather',dur:'2 min',text:`Close your eyes.

Covering ground fast. The catcher is under pressure. You can see his feet adjusting, uncertain. He's not comfortable.

You pin him. One metre. He kicks — hurried, weak. Your winger reads it early. Clean gather. Gain.

You pull up. Seventy-two minutes. Legs are heavy. You feel it in your quads.

"Next play."

Not the scoreboard. Not the ache. Not the minutes left. Next play.

Breathe out. You're ready.`},
  {id:'vs5',title:'Pre-Game — Final 5 Minutes',dur:'5 min',text:`Find somewhere quiet if you can. Feet firmly on the ground.

Picture your first action of the game. The kick comes to you. You call it early. You take it cleanly. You play on.

That is the only job right now. The first action. Everything after follows from that.

Feel your feet on the ground. Open and close your hands. Roll your shoulders back and down. You are here. You are ready.

Open your eyes. Shake out your hands.

It's time.`}

        <div style="display:flex;gap:8px;margin-top:12px;">
          <button class="btn btn-acc btn-sm" onclick="markField('${f.id}',true)">${fd[f.id]?'✓ COMPLETED':'MARK DONE'}</button>
          <button class="btn btn-ghost btn-sm" onclick="openModal('kick-modal')">LOG KICKING</button>
        </div>
      </div>
    </div>
  `).join('');
}
function toggleFieldSess(id){const cur=sg('fieldOpen_'+id,false);FIELD.forEach(f=>ss('fieldOpen_'+f.id,false));ss('fieldOpen_'+id,!cur);renderTrainTab()}
function markField(id,v){const fd=sg('fieldDone',{});fd[id]=v;ss('fieldDone',fd);renderTrainTab();toast('Session marked done');}

function renderPreGame(){
  const pgd=sg('preGameChecks',{});
  return Object.entries(PREGAME).map(([key,phase])=>`
    <div class="pg-phase">
      <div class="pg-phase-title">${phase.title}</div>
      ${phase.items.map((item,i)=>{
        const ck=`pg_${key}_${i}_${today()}`;const done=pgd[ck];
        return`<div class="chk-row ${done?'done':''}" onclick="togglePG('${ck}')"><div class="chk-circle"><span class="chk-tick">✓</span></div><div style="font-size:14px;">${item}</div></div>`;
      }).join('')}
    </div>
  `).join('')+`<button class="btn btn-danger btn-sm btn-full" style="margin-top:4px;" onclick="clearPG()">RESET PRE-GAME CHECKLIST</button>`;
}
function togglePG(ck){const pgd=sg('preGameChecks',{});pgd[ck]=!pgd[ck];ss('preGameChecks',pgd);renderTrainTab()}
function clearPG(){const pgd=sg('preGameChecks',{});Object.keys(pgd).forEach(k=>{if(k.includes(`_${today()}`))delete pgd[k]});ss('preGameChecks',pgd);renderTrainTab();toast('Checklist reset')}

let recStep=0,recRunning=false,recTimerID=null,recSecs=0;
function renderRecovery(){
  return`
<div class="lbl" style="margin-bottom:12px;">RECOVERY SESSION — CONTRAST PROTOCOL</div>
<div style="font-size:13px;color:var(--txt2);margin-bottom:14px;line-height:1.6;">Use the gym recovery facilities. Hot/cold contrast is proven to reduce DOMS, flush metabolic waste, and improve next-session readiness. Do this after high-load sessions (Day A or Day B) or post-game.</div>
${REC.map((step,i)=>`
  <div class="rec-step ${i===recStep&&recRunning?'cur':''} ${i<recStep&&recRunning?'fin':''}" id="rstep-${i}">
    <div class="step-num">${i+1}</div>
    <div class="step-info">
      <div class="step-name">${step.n}</div>
      <div class="step-dur">${step.mins} min</div>
      <div class="step-tip">${step.tip}</div>
    </div>
    ${i===recStep?`<button class="step-timer" id="rec-timer-btn" onclick="toggleRecTimer(${step.mins*60})">${recRunning?formatSecs(recSecs):step.mins+'m'}</button>`:''}
  </div>
`).join('')}
<div style="display:flex;gap:8px;margin-top:14px;">
  <button class="btn btn-acc btn-sm" onclick="startRec()">▶ START SESSION</button>
  <button class="btn btn-ghost btn-sm" onclick="resetRec()">RESET</button>
</div>`;
}
function startRec(){recStep=0;recRunning=false;recTimerID=null;recSecs=0;renderTrainTab();nextRecStep()}
function nextRecStep(){if(recStep>=REC.length){toast('Recovery session complete 🎉');recRunning=false;recStep=0;return}recRunning=true;recSecs=REC[recStep].mins*60;renderTrainTab();startRecTimer()}
function toggleRecTimer(total){if(recTimerID){clearInterval(recTimerID);recTimerID=null;renderTrainTab()}else startRecTimer()}
function startRecTimer(){
  if(recTimerID)clearInterval(recTimerID);
  recTimerID=setInterval(()=>{
    recSecs--;
    const btn=document.getElementById('rec-timer-btn');
    if(btn)btn.textContent=formatSecs(recSecs);
    if(recSecs<=0){clearInterval(recTimerID);recTimerID=null;toast(REC[recStep].n+' done!');recStep++;if(recStep<REC.length){recSecs=REC[recStep].mins*60;renderTrainTab();startRecTimer()}else{recRunning=false;recStep=0;renderTrainTab();toast('Recovery complete 🎉')}}
  },1000);
}
function resetRec(){if(recTimerID)clearInterval(recTimerID);recTimerID=null;recRunning=false;recStep=0;recSecs=0;renderTrainTab()}
function formatSecs(s){const m=Math.floor(s/60),ss=s%60;return`${m}:${ss.toString().padStart(2,'0')}`}

</div>
<div id="mental-content"></div>`;

function switchMentalTab(t){if(breathTimer){clearInterval(breathTimer);breathTimer=null}mentalTab=t;renderMentalTab()}

function renderVis(){

function toggleScr(id){const cur=sg('scrOpen_'+id,false);SCRIPTS.forEach(s=>ss('scrOpen_'+s.id,false));ss('scrOpen_'+id,!cur);renderMentalTab()}

let breathPhase=0,breathCount=0,breathSecs=0,breathType='box';
const BREATH_BOX=[{p:'INHALE',s:4,cl:'expand'},{p:'HOLD',s:4,cl:'hold-big'},{p:'EXHALE',s:4,cl:'contract'},{p:'HOLD',s:4,cl:'hold-small'}];
const BREATH_478=[{p:'INHALE',s:4,cl:'expand'},{p:'HOLD',s:7,cl:'hold-big'},{p:'EXHALE',s:8,cl:'contract'}];

function renderBreath(){
  const phases=breathType==='box'?BREATH_BOX:BREATH_478;
  const ph=phases[breathPhase%phases.length];
  const active=breathTimer!==null;
  return`
<div style="margin-bottom:14px;">
  <div class="tabbar">
    <button class="tbb ${breathType==='box'?'on':''}" onclick="setBreathType('box')">BOX (4-4-4-4)</button>
    <button class="tbb ${breathType==='478'?'on':''}" onclick="setBreathType('478')">4-7-8</button>
  </div>
  <div style="font-size:13px;color:var(--txt2);margin-bottom:4px;">
    ${breathType==='box'?'Pre-performance: sharpens focus and regulates arousal before sessions or games.':'Recovery and sleep: slows heart rate and drops cortisol. Do this in bed.'}
  </div>
</div>
<div class="breath-wrap">
  <div class="bc-type">${breathType==='box'?'BOX BREATHING — 4-4-4-4':'4-7-8 BREATHING — RECOVERY'}</div>
  <div class="bc-ring">
    <div class="bc ${active?ph.cl:''}" id="breath-circle">
      <div class="bc-num" id="breath-num">${active?breathSecs:ph.s}</div>
      <div class="bc-phase" id="breath-phase">${active?ph.p:'READY'}</div>
    </div>
  </div>
  <div style="font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--txt2);margin-bottom:20px;">Round ${Math.floor(breathCount/phases.length)+1}</div>
  <button class="btn ${active?'btn-ghost':'btn-acc'}" onclick="${active?'stopBreath()':'startBreath()'}">${active?'STOP':'START'}</button>
</div>`;
}

function setBreathType(t){stopBreath();breathType=t;breathPhase=0;breathCount=0;breathSecs=0;renderMentalTab()}
function startBreath(){
  if(breathTimer)return;
  const phases=breathType==='box'?BREATH_BOX:BREATH_478;
  breathSecs=phases[breathPhase%phases.length].s;
  renderMentalTab();
  breathTimer=setInterval(()=>{
    breathSecs--;
    const ph=phases[breathPhase%phases.length];
    const numEl=document.getElementById('breath-num');
    const phEl=document.getElementById('breath-phase');
    const circ=document.getElementById('breath-circle');
    if(numEl)numEl.textContent=breathSecs;
    if(phEl)phEl.textContent=ph.p;
    if(circ){circ.className='bc '+ph.cl}
    if(breathSecs<=0){
      breathCount++;breathPhase=(breathPhase+1)%phases.length;
      breathSecs=phases[breathPhase].s;
    }
  },1000);
}
function stopBreath(){if(breathTimer){clearInterval(breathTimer);breathTimer=null}breathPhase=0;breathCount=0;breathSecs=0;if(document.getElementById('mental-content'))renderMentalTab()}

function renderCues(){
  return CUES.map(g=>`
    <div class="cue-grp">
      <div class="cue-title">${g.icon} ${g.sit}</div>
      ${g.items.map(c=>`<div class="cue-item">${c}</div>`).join('')}
    </div>
  `).join('');
}

const FILM_CATS=['All','Fullback Analysis','Rugby IQ & Tactics','Kicking','Gym & Athletic','Behind the Scenes','Mental Performance'];
let filmCat='All';

function rFilm(){
  const fs=sg('filmStatus',{});
  const watched=Object.values(fs).filter(v=>v==='w').length;
  const rewatch=Object.values(fs).filter(v=>v==='r').length;

<div class="hd2">FILM STUDY</div>
<div class="stats-row">
  <div class="stat-box"><div class="stat-val">${watched}</div><div class="stat-lbl">WATCHED</div></div>

</div>
<div class="pills" id="film-pills">

</div>

function setFilmCat(c){filmCat=c;document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('on',p.textContent.includes(c==='All'?'ALL':c.toUpperCase())));document.getElementById('film-list').innerHTML=renderFilmList()}

        </div>
        <div class="vc-actions">
          <div class="vc-dot ${fs[v.id]==='w'?'w':''}" onclick="setFilmStatus(event,'${v.id}','w')" title="Watched">✓</div>
          <div class="vc-dot ${fs[v.id]==='r'?'r':''}" onclick="setFilmStatus(event,'${v.id}','r')" title="Rewatch">↻</div>
        </div>
      </div>
      <div class="vc-body">
        <div class="lbl" style="margin-bottom:7px;">WATCH CHECKLIST</div>
        ${v.checks.map(c=>`<div class="wc-row">${c}</div>`).join('')}
        <a class="yt-link" href="${v.url}" target="_blank">

        </a>

function toggleVc(id){const cur=sg('filmOpen_'+id,false);ss('filmOpen_'+id,!cur);document.getElementById('film-list').innerHTML=renderFilmList()}
function setFilmStatus(e,id,status){

// ═══════════════════════════════════════════════════════════
// LOG
// ═══════════════════════════════════════════════════════════
let logTab='kicking';
let kConf=0,hsSel='',fatSel=0,slpSel=0;

function rLog(){
  document.getElementById('v-log').innerHTML=`
<div class="hd2">LOG</div>
<div class="tabbar">
  <button class="tbb ${logTab==='kicking'?'on':''}" onclick="switchLogTab('kicking')">KICKING</button>
  <button class="tbb ${logTab==='monitor'?'on':''}" onclick="switchLogTab('monitor')">MONITOR</button>
  <button class="tbb ${logTab==='week'?'on':''}" onclick="switchLogTab('week')">WEEK</button>
</div>
<div id="log-content"></div>`;
  renderLogTab();
}
function switchLogTab(t){logTab=t;renderLogTab()}
function renderLogTab(){
  const el=document.getElementById('log-content');
  if(logTab==='kicking')el.innerHTML=renderKickLog();
  else if(logTab==='monitor')el.innerHTML=renderMonLog();
  else el.innerHTML=renderWeek();
}

function renderKickLog(){
  const kicks=sg('kickLog',[]);
  const allPct=kicks.filter(k=>k.total>0).map(k=>Math.round(k.makes/k.total*100));
  const bestPct=allPct.length?Math.max(...allPct):0;
  const bestDist=kicks.length?Math.max(...kicks.map(k=>k.dist||0)):0;
  const cons=calcConsecutive(kicks);
  const recent=kicks.slice().reverse().slice(0,15);

  return`
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
  <div class="lbl">PERSONAL BESTS</div>
  <button class="btn btn-acc btn-sm" onclick="openModal('kick-modal')">+ LOG SESSION</button>
</div>
<div class="pb-grid">
  <div class="pb-card"><div class="pb-val">${bestPct}%</div><div class="pb-lbl">BEST SESSION %</div></div>
  <div class="pb-card"><div class="pb-val">${bestDist}m</div><div class="pb-lbl">LONGEST KICK</div></div>
  <div class="pb-card"><div class="pb-val">${kicks.length}</div><div class="pb-lbl">SESSIONS</div></div>
  <div class="pb-card"><div class="pb-val">${cons}</div><div class="pb-lbl">CONSEC. MAKES</div></div>
</div>
${kicks.length>0?`
<div class="lbl" style="margin-bottom:8px;">RECENT SESSIONS</div>
${recent.map(k=>`<div class="kle">
  <div class="kle-pct">${Math.round(k.makes/k.total*100)}%</div>
  <div class="kle-det">
    <div class="kle-date">${k.date} · ${k.type} · ${k.cond}</div>
    <div class="kle-type">${k.makes}/${k.total} makes${k.dist?` · ${k.dist}m max`:''}${k.conf?` · Conf: ${k.conf}/5`:''}</div>
    ${k.notes?`<div class="kle-note">${k.notes}</div>`:''}
  </div>
</div>`).join('')}
<button class="btn btn-danger btn-sm" style="margin-top:8px;" onclick="clearKicks()">CLEAR ALL LOGS</button>
`:`<div style="text-align:center;padding:32px 0;color:var(--txt3);font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:.08em;">NO SESSIONS LOGGED YET<br>TAP + LOG SESSION TO START</div>`}`;
}

function calcConsecutive(kicks){
  let max=0,cur=0;
  kicks.forEach(k=>{if(k.makes===k.total&&k.total>0)cur++;else cur=0;max=Math.max(max,cur)});
  return max;
}
function clearKicks(){if(confirm('Clear all kicking logs?')){ss('kickLog',[]);renderLogTab();toast('Logs cleared')}}

function renderMonLog(){
  const mons=sg('monLogs',[]).slice().reverse().slice(0,14);
  return`
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
  <div class="lbl">MONITORING LOG</div>
  <button class="btn btn-acc btn-sm" onclick="openModal('mon-modal')">+ CHECK IN</button>
</div>
${mons.length>0?mons.map(m=>{
  const hsCl={g:'tag-g',y:'tag-y',r:'tag-r'}[m.hs]||'';
  const hsLbl={g:'CLEAR',y:'TIGHT',r:'PAIN'}[m.hs]||'—';
  return`<div class="kle">
    <div style="min-width:38px;text-align:center;">
      <div class="lbl" style="font-size:8px;">${m.date.slice(5)}</div>
      <span class="tag ${hsCl}" style="font-size:9px;padding:2px 5px;">${hsLbl}</span>
    </div>
    <div class="kle-det">
      <div class="kle-type">Fatigue: ${m.fat||'—'}/5  ·  Sleep: ${m.slp||'—'}/5</div>
      ${m.notes?`<div class="kle-note">${m.notes}</div>`:''}
    </div>
  </div>`;
}).join(''):`<div style="text-align:center;padding:32px 0;color:var(--txt3);font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:.08em;">NO CHECK-INS YET</div>`}`;
}

function renderWeek(){
  const days=['M','T','W','T','F','S','S'];
  const kicks=sg('kickLog',[]);const mons=sg('monLogs',[]);
  const now=new Date();const dow=now.getDay();
  const monOffset=dow===0?6:dow-1;
  const weekDates=Array.from({length:7},(_,i)=>{
    const d=new Date(now);d.setDate(now.getDate()-monOffset+i);
    return d.toISOString().slice(0,10);
  });
  const fdone=sg('fieldDone',{});const checks=sg('dailyChecks',{});
  return`
<div class="lbl" style="margin-bottom:10px;">THIS WEEK</div>
<div class="week-grid">
  ${weekDates.map((d,i)=>{
    const td=d===today();
    const mon=mons.find(m=>m.date===d);
    const hs=mon?.hs;
    const cls=hs==='g'?'has-g':hs==='y'?'has-y':hs==='r'?'has-r':'';
    const chk=checks[d]||{};const cdone=DAILY.filter(it=>chk[it.id]).length;
    return`<div class="wd ${cls} ${td?'today-hl':''}">
      <div class="wd-day">${days[i]}</div>
      <div>${cdone>0?cdone:''}</div>
    </div>`;
  }).join('')}
</div>
<div style="display:flex;gap:10px;margin-bottom:16px;font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--txt2);">
  <span style="color:var(--grn);">■</span> CLEAR&nbsp;&nbsp;<span style="color:var(--yel);">■</span> TIGHT&nbsp;&nbsp;<span style="color:var(--red);">■</span> PAIN&nbsp;&nbsp;Numbers = daily checks done
</div>
<div class="lbl" style="margin-bottom:8px;">THIS WEEK'S KICKING</div>
${weekDates.map(d=>{const ks=kicks.filter(k=>k.date===d);return ks.length?ks.map(k=>`<div class="kle"><div class="kle-pct">${Math.round(k.makes/k.total*100)}%</div><div class="kle-det"><div class="kle-date">${d}</div><div class="kle-type">${k.type} · ${k.makes}/${k.total}</div></div></div>`).join(''):''}).join('')||`<div style="color:var(--txt3);font-size:13px;text-align:center;padding:16px 0;">No kicking logged this week</div>`}`;
}

// ═══════════════════════════════════════════════════════════
// KICK MODAL
// ═══════════════════════════════════════════════════════════
function selConf(n){kConf=n;document.querySelectorAll('#k-conf-row .sc-btn').forEach((b,i)=>b.classList.toggle('sel',i+1===n))}
function saveKick(){
  const makes=parseInt(document.getElementById('k-makes').value)||0;
  const total=parseInt(document.getElementById('k-total').value)||0;
  if(!total){toast('Enter total kicks');return}
  const entry={date:today(),type:document.getElementById('k-type').value,makes,total,dist:parseInt(document.getElementById('k-dist').value)||0,cond:document.getElementById('k-cond').value,conf:kConf,notes:document.getElementById('k-notes').value.trim()};
  const log=sg('kickLog',[]);log.push(entry);ss('kickLog',log);
  closeModal('kick-modal');kConf=0;
  document.getElementById('k-makes').value='';document.getElementById('k-total').value='';
  document.getElementById('k-dist').value='';document.getElementById('k-notes').value='';
  document.querySelectorAll('#k-conf-row .sc-btn').forEach(b=>b.classList.remove('sel'));
  toast(`${makes}/${total} logged ✓`);
  if(curView==='log')renderLogTab();
  if(curView==='home')rHome();
}

// ═══════════════════════════════════════════════════════════
// MONITOR MODAL
// ═══════════════════════════════════════════════════════════
function selHS(s){hsSel=s;['g','y','r'].forEach(x=>document.getElementById('hs-'+x).className='mon-opt'+(s===x?' s'+s:''))}
function selFat(n){fatSel=n;document.querySelectorAll('#fat-row .sc-btn').forEach((b,i)=>b.classList.toggle('sel',i+1===n))}
function selSlp(n){slpSel=n;document.querySelectorAll('#slp-row .sc-btn').forEach((b,i)=>b.classList.toggle('sel',i+1===n))}
function saveMon(){
  if(!hsSel){toast('Select hamstring status');return}
  const entry={date:today(),hs:hsSel,fat:fatSel,slp:slpSel,notes:document.getElementById('mon-notes').value.trim()};
  const log=sg('monLogs',[]).filter(m=>m.date!==today());log.push(entry);ss('monLogs',log);
  closeModal('mon-modal');hsSel='';fatSel=0;slpSel=0;
  document.getElementById('mon-notes').value='';
  toast('Check-in saved ✓');
  if(curView==='log')renderLogTab();
  if(curView==='home')rHome();
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
rHome();
</script>
